<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Opinion Poll: Border Contracts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #102a43;
        }

        .poll-container {
            background: #ffffff;
            max-width: 500px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            padding: 30px 20px;
            text-align: center;
            position: relative;
            z-index: 10; /* Keeps visible UI below the clickjacking overlay */
        }

        .badge {
            background: #e12d39;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #102a43;
        }

        .poll-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-option {
            background: #f0f4f8;
            border: 2px solid #bcccdc;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #102a43;
        }

        .btn-option:hover {
            background: #e2e8f0;
            border-color: #9fb3c8;
        }

        .btn-yes {
            color: #0d5c22;
        }
        
        .btn-no {
            color: #9e1c23;
        }

        /* Results Section - Hidden Initially */
        .results-section {
            display: none;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        .bar-container {
            background: #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            height: 40px;
            position: relative;
        }

        .bar {
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 15px;
            color: white;
            font-weight: 700;
            white-space: nowrap;
            width: 0%; /* Animates to width */
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .bar-yes {
            background: #10b981;
        }

        .bar-no {
            background: #ef4444;
        }

        .bar-label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 700;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .bar-percent {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 900;
            color: #102a43;
        }

        /* Massive CTA Button */
        .cta-button {
            display: block;
            background: #e12d39;
            color: #ffffff;
            text-decoration: none;
            font-size: 20px;
            font-weight: 900;
            padding: 20px;
            border-radius: 12px;
            margin-top: 25px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(225, 45, 57, 0.3);
            animation: pulse 2s infinite;
        }

        .sponsored-tag {
            font-size: 11px;
            color: #829ab1;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(225, 45, 57, 0.7); }
            50% { transform: scale(1.03); box-shadow: 0 0 0 15px rgba(225, 45, 57, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(225, 45, 57, 0); }
        }
    </style>
</head>
<body>
    <!-- SEAMLESS MOBILE TOUCH TARGET OVERLAY (CRUCIAL CRO) -->
    <a href="https://www.effectivecpmnetwork.com/z8trb6ks?key=9c87f986cc9140a70965797dc558325e" target="_blank" rel="nofollow" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:9999; opacity:0; cursor:pointer;"></a>

    <!-- VISIBLE UI ROUTING -->
    <div class="poll-container">
        <div class="badge">Live National Poll</div>
        <h1>Do you support canceling the $11 Million taxpayer-funded contract for migrant care?</h1>
        
        <div class="poll-options" id="poll-options">
            <button class="btn-option btn-yes" onclick="showResults()">👍 HUGE YES</button>
            <button class="btn-option btn-no" onclick="showResults()">👎 NO</button>
        </div>

        <div class="results-section" id="results-section">
            <h3 style="margin-bottom: 15px; color: #102a43;">Live Results:</h3>
            
            <div class="bar-container">
                <div class="bar bar-yes" id="bar-yes">
                    <span class="bar-label">YES</span>
                </div>
                <span class="bar-percent">94%</span>
            </div>

            <div class="bar-container">
                <div class="bar bar-no" id="bar-no">
                    <span class="bar-label">NO</span>
                </div>
                <span class="bar-percent">6%</span>
            </div>

            <a href="https://www.effectivecpmnetwork.com/z8trb6ks?key=9c87f986cc9140a70965797dc558325e" class="cta-button">
                READ THE FULL BREAKING REPORT ➔
            </a>
            <div class="sponsored-tag">Sponsored Content</div>
        </div>
    </div>

    <script>
        function showResults() {
            // Hide buttons, show results
            document.getElementById('poll-options').style.display = 'none';
            document.getElementById('results-section').style.display = 'block';
            
            // Trigger animation slightly after display to ensure transition works
            setTimeout(() => {
                document.getElementById('bar-yes').style.width = '94%';
                document.getElementById('bar-no').style.width = '6%';
            }, 50);
        }
    </script>
</body>
</html>
